<!-- landing.component.html -->
<div class="d-flex flex-column align-items-center vh-100 position-relative">
  <!-- Logo Section -->
  <div class="d-flex flex-column align-items-center my-auto">
    <div
      class="rounded-circle bg-black d-flex align-items-center justify-content-center shadow-sm"
      style="width: 120px; height: 120px"
    >
      <i class="bi bi-car-front-fill text-white fs-2"></i>
    </div>
    <h1 class="fw-bold mt-3 fs-5 text-dark">Park Ease</h1>
    <p class="text-secondary mt-1 fs-6">Parking, Simplified.</p>

    <!-- Welcome -->
    <h2 class="fw-bold text-dark mt-4 fs-2">Welcome Back!</h2>
    <p class="text-secondary mb-0">Choose how you'd like to continue</p>

    <!-- Buttons -->
    <div
      class="d-flex flex-column align-items-center mt-4 w-100 px-3"
      style="max-width: 320px"
    >
      <a
        class="btn btn-yellow w-100 fw-semibold py-3 rounded-3 fs-6 border-2 text-decoration-none"
        [routerLink]="['/vendor/login']"
      >
        <i class="bi bi-shop me-2"></i>Vendor
      </a>

      <span class="my-2 text-secondary">Or</span>

      <a
        class="btn btn-yellow w-100 fw-semibold py-3 rounded-3 fs-6 border-2 text-decoration-none"
        [routerLink]="['/customer/login']"
      >
        <i class="bi bi-person me-2"></i>Customer
      </a>
    </div>
  </div>

  <!-- Footer -->
  <p class="text-muted mb-3" style="font-size: 0.75rem">
    &copy; 2026 Smart Parking &middot;
    <a
      [routerLink]="['/super_admin/login']"
      class="text-muted text-decoration-none"
      style="border-bottom: 1px dashed rgba(0, 0, 0, 0.3)"
    >
      Are You an Admin
    </a>
  </p>
</div>
