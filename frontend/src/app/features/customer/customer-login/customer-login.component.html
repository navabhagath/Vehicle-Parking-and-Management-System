<div
  class="position-relative d-flex flex-column align-items-center justify-content-center min-vh-100 px-3 py-4"
>
  <div class="text-center mb-4">
    <!-- Logo placeholder -->
    <div
      class="d-inline-flex align-items-center justify-content-center rounded-circle bg-dark mb-3"
      style="width: 64px; height: 64px"
    >
      <i class="bi bi-car-front-fill text-white fs-3"></i>
    </div>
    <h1 class="fs-4 fw-bold text-dark mb-1">Welcome Back!</h1>
    <p class="text-secondary small mb-0">
      Login to find & book parking instantly
    </p>
  </div>

  <!-- Login Form -->
  <div
    *ngIf="!isLoggedIn"
    class="w-100"
    style="max-width: 400px; margin: 0 auto"
  >
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div
        *ngIf="errorMessage"
        class="alert alert-danger small text-red py-2 d-flex align-items-center mb-3"
        role="alert"
      >
        <i class="bi bi-exclamation-circle-fill me-2"></i>{{ errorMessage }}
      </div>

      <!-- Phone -->
      <div class="mb-1">
        <label class="form-label fw-semibold small mb-1">Phone Number</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <img
              src="https://flagcdn.com/w20/in.png"
              width="20"
              alt="India flag"
              class="me-1"
            />
            <span class="small fw-semibold text-dark">+91</span>
          </span>
          <input
            type="tel"
            formControlName="phone"
            class="form-control border-start-0"
            [class.is-invalid]="
              loginForm.get('phone')?.touched && loginForm.get('phone')?.invalid
            "
            [attr.readonly]="isOtpSent ? true : null"
            placeholder="10-digit number"
          />
        </div>
        <div style="min-height: 1.45rem" class="mt-1 text-center">
          <small
            class="text-danger"
            *ngIf="
              loginForm.get('phone')?.touched &&
              loginForm.get('phone')?.errors?.['required']
            "
          >
            Phone number is required.
          </small>
          <small
            class="text-danger"
            *ngIf="
              loginForm.get('phone')?.dirty &&
              loginForm.get('phone')?.errors?.['pattern']
            "
          >
            Enter a valid 10-digit number.
          </small>
        </div>
      </div>

      <!-- OTP -->
      <div *ngIf="isOtpSent" class="mb-1">
        <label for="otp" class="form-label fw-semibold small mb-1"
          >Enter 4-Digit OTP</label
        >
        <input
          id="otp"
          type="text"
          formControlName="otp"
          class="form-control text-center fw-bold"
          maxlength="4"
          placeholder="0000"
          [class.is-invalid]="
            loginForm.get('otp')?.touched && loginForm.get('otp')?.invalid
          "
        />
        <div style="min-height: 1.25rem" class="mt-1"></div>

        <div class="d-flex justify-content-between align-items-center">
          <div class="small text-secondary">
            <ng-container
              *ngIf="otpTimer.timeLeft$ | async as time; else resendBtn"
            >
              <span
                >Resend in <b class="text-dark">{{ time }}s</b></span
              >
            </ng-container>
            <ng-template #resendBtn>
              <a
                href="javascript:void(0)"
                (click)="resendOtp()"
                class="fw-bold text-primary text-decoration-none"
              >
                Resend OTP
              </a>
            </ng-template>
          </div>
          <a
            href="javascript:void(0)"
            class="small text-secondary text-decoration-none"
            (click)="toggleNumberChange()"
          >
            Change Number?
          </a>
        </div>
      </div>

      <!-- Submit -->
      <div class="mt-3">
        <button
          type="submit"
          [disabled]="loginForm.invalid || isLoading"
          class="btn w-100 py-2 fw-bold rounded-3 shadow-sm"
          [ngClass]="isOtpSent ? 'btn-green' : 'btn-yellow'"
        >
          <span
            *ngIf="isLoading"
            class="spinner-border spinner-border-sm me-2"
            role="status"
            aria-hidden="true"
          ></span>
          {{ isOtpSent ? "VERIFY & LOGIN" : "SEND OTP" }}
        </button>
      </div>
    </form>

    <!-- Trust Badges -->
    <div class="d-flex justify-content-center gap-4 mt-4 pt-2">
      <div class="text-center">
        <div
          class="d-inline-flex align-items-center justify-content-center rounded-circle bg-light mb-1"
          style="width: 40px; height: 40px"
        >
          <i class="bi bi-shield-lock-fill text-success"></i>
        </div>
        <p class="small text-secondary mb-0" style="font-size: 0.7rem">
          Secure<br />Login
        </p>
      </div>
      <div class="text-center">
        <div
          class="d-inline-flex align-items-center justify-content-center rounded-circle bg-light mb-1"
          style="width: 40px; height: 40px"
        >
          <i class="bi bi-lightning-charge-fill text-warning"></i>
        </div>
        <p class="small text-secondary mb-0" style="font-size: 0.7rem">
          Instant<br />Access
        </p>
      </div>
      <div class="text-center">
        <div
          class="d-inline-flex align-items-center justify-content-center rounded-circle bg-light mb-1"
          style="width: 40px; height: 40px"
        >
          <i class="bi bi-bell-slash-fill text-info"></i>
        </div>
        <p class="small text-secondary mb-0" style="font-size: 0.7rem">
          No<br />Spam
        </p>
      </div>
    </div>
  </div>

  <!-- Logged In (Testing) -->
  <!-- <div *ngIf="isLoggedIn" class="row justify-content-center mt-5">
    <div class="col-11 col-md-6 text-center">
      <div class="card border-0 shadow-sm p-4 text-center">
        <h4 class="fw-bold">Welcome, {{ loggedInUser.name }}!</h4>
        <p class="text-muted">Redirecting to your dashboard...</p>
        <button class="btn btn-outline-danger mt-3" (click)="onLogout()">
          Cancel / Logout
        </button>
      </div>
    </div>
  </div> -->

  <!-- Footer -->
  <div class="position-absolute bottom-0 start-0 end-0 pb-3 text-center">
    <p class="text-secondary mb-0" style="font-size: 0.72rem">
      By continuing, you agree to our
      <a
        href="javascript:void(0)"
        class="text-dark fw-semibold text-decoration-none"
        >Terms</a
      >
      &
      <a
        href="javascript:void(0)"
        class="text-dark fw-semibold text-decoration-none"
        >Privacy Policy</a
      >
    </p>
  </div>
</div>
