<div class="wallet-card d-flex flex-column align-items-center justify-content-center gap-4 mb-5">
 
  <div class="text-center">
    <p class="wallet-label mb-1">Wallet Value</p>
    <h2 class="wallet-amount mb-0">{{ walletValue | currency:'INR':'symbol':'1.2-2' }}</h2>
  </div>
 
  <div class="d-flex gap-4">
    <button class="wallet-action-btn" routerLink='/customer/wallet'>
      <i class="bi bi-plus-lg"></i>
    </button>
    <button class="wallet-action-btn" routerLink="/customer/recentTransactions">
      <i class="bi bi-clock"></i>
    </button>
    <button
      class="wallet-action-btn"
      (click)="downloadTransactionsPdf()"
      [disabled]="isDownloading"
    >
      <i class="bi" [ngClass]="isDownloading ? 'bi-arrow-repeat spin' : 'bi-box-arrow-in-down'"></i>
    </button>
  </div>
 
</div>
