<div class="dropdown">
  <button
    class="btn shadow-premium loc-border dropdown-toggle no-caret d-flex align-items-center gap-2"
    type="button"
    data-bs-toggle="dropdown"
    aria-expanded="false"
  >
    <span class="fw-medium">{{ selectedLocation?.locationName }}</span>
  </button>

  <ul class="dropdown-menu border-0 shadow-premium rounded-3 p-1">
    @for (loc of locations; track loc.id) {
      <li>
        <button
          class="dropdown-item rounded-2 py-2 px-3"
          [class.active]="loc.id === selectedLocation?.id"
          (click)="selectLocation(loc)"
        >
          {{ loc.locationName }}
        </button>
      </li>
    }
  </ul>
</div>
