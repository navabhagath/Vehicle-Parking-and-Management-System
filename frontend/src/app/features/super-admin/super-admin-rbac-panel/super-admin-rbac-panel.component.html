<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 p-0 bg-dark min-vh-100 position-sticky top-0">
      <app-sidebar></app-sidebar>
    </div>
    <div class="col-md-10 bg-light">
      <div class="container-fluid py-4 bg-light min-vh-100">
        <div class="d-flex justify-content-between align-items-end mb-4">
          <div>
            <h2 class="fw-bold mb-1">User Management</h2>
            <p class="text-muted small mb-0">Overview of all system users.</p>
          </div>
        </div>

        <div class="card border-0 shadow-sm mb-4 rounded-4">
          <div class="card-body p-3">
            <input
              type="text"
              class="form-control form-control-lg bg-light border-1"
              placeholder="Search by name, phone, or role..."
              (input)="applyFilter($event)"
            />
          </div>
        </div>

        <div
          *ngIf="adminSearchUserService.isLoading()"
          class="text-center py-5"
        >
          <div class="spinner-border text-primary" role="status"></div>
          <p class="text-muted mt-2">Loading users...</p>
        </div>

        <div
          *ngIf="!adminSearchUserService.isLoading()"
          class="card border-0 shadow-sm rounded-4 overflow-hidden"
        >
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 bg-white">
              <thead class="table-light">
                <tr>
                  <th scope="col" class="ps-4 py-3 text-secondary fw-semibold">
                    User Details
                  </th>
                  <th scope="col" class="py-3 text-secondary fw-semibold">
                    Phone
                  </th>
                  <th scope="col" class="py-3 text-secondary fw-semibold">
                    Role
                  </th>
                  <th scope="col" class="py-3 text-secondary fw-semibold">
                    Status
                  </th>
                  <th
                    scope="col"
                    class="text-end pe-4 py-3 text-secondary fw-semibold"
                  >
                    Actions
                  </th>
                </tr>
              </thead>

              <tbody>
                <tr
                  *ngFor="let user of adminSearchUserService.filteredUsers()"
                  class="cursor-pointer"
                  (click)="goToDetails(user.id)"
                >
                  <td class="ps-4 py-3">
                    <div class="fw-bold text-dark">{{ user.name }}</div>
                    <div class="text-muted small">{{ user.id }}</div>
                  </td>

                  <td class="py-3">{{ user.phone }}</td>

                  <td class="py-3">
                    <span
                      class="badge px-2 py-1"
                      [ngClass]="
                        user.role === 'VENDOR'
                          ? 'bg-light-blue'
                          : user.role === 'SUPER_ADMIN'
                            ? 'bg-red'
                            : 'bg-black'
                      "
                    >
                      {{ user.role }}
                    </span>
                  </td>

                  <td class="py-3">
                    <span
                      class="badge px-2 py-1"
                      [ngClass]="
                        user.accountStatus === 'ACTIVE'
                          ? 'bg-green'
                          : 'bg-red text-white'
                      "
                    >
                      {{ user.accountStatus }}
                    </span>
                  </td>

                  <td class="text-end pe-4 py-3">
                    <button
                      class="btn btn-sm btn-outline-black fw-bold px-3"
                      (click)="goToDetails(user.id); $event.stopPropagation()"
                    >
                      Manage Access
                    </button>
                  </td>
                </tr>

                <tr *ngIf="adminSearchUserService.filteredUsers().length === 0">
                  <td colspan="5" class="text-center py-5 text-muted">
                    No users found matching your search.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
