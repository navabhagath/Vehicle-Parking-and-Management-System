
<div class="border rounded-3 p-3 m-3 bg-white">

  <!-- Header  -->
  <div class="d-flex justify-content-between align-items-start mb-3">
    <div>
      <h6 class="fw-bold mb-0" style="font-size:14px;">Revenue Overview</h6>
      <small class="text-muted" style="font-size:11px;">Completed &amp; overstayed earnings</small>
    </div>
    <div class="btn-group btn-group-sm">
      <button
        *ngFor="let r of ranges"
        type="button"
        class="btn"
        [ngClass]="activeRange === r.key ? 'btn-primary text-white' : 'btn-light'"
        [style.background-color]="activeRange === r.key ? '#2563eb ' : ''"
        (click)="$event.preventDefault(); onRangeChange(r.key)"
        style="font-size:11px; padding: 4px 10px;">
        {{ r.label }}
      </button>
    </div>
  </div>

  <!-- Bar Chart -->
  <apx-chart
    [series]="barSeries"
    [chart]="barChart"
    [xaxis]="barXAxis"
    [yaxis]="barYAxis"
    [dataLabels]="barDataLabels"
    [colors]="barColors">
  </apx-chart>
</div>
