
<div class="border rounded-3 p-3 m-3 bg-white">

  <!-- title  -->
  <div class="d-flex justify-content-between align-items-start mb-3">
    <div>
      <h6 class="fw-bold mb-0" style="font-size:14px;">Vehicle Revenue</h6>
      <small class="text-muted" style="font-size:11px;">By vehicle type</small>
    </div>
    <div class="btn-group btn-group-sm border ">
      <button
        *ngFor="let p of periods"
        type="button"
        class="btn"
        [ngClass]="activePeriod === p.key ? 'btn-primary text-white' : 'btn-light'"
        [style.background-color]="activePeriod === p.key ? '#2563eb' : ''"
        (click)="onPeriodChange(p.key)"
        style="font-size:11px; padding: 4px 10px; font-weight: 600;">
        {{ p.label }}
      </button>
    </div>
  </div>

  <!-- Chart + Legend row -->
  <div class="row align-items-center g-2">

    <!-- Donut Chart -->
    <div class="col-6">
      <apx-chart
        #pieChartRef
        [series]="pieSeries"
        [chart]="pieChart"
        [labels]="pieLabels"
        [colors]="pieColors"
        [stroke]="pieStroke"
        [dataLabels]="pieDataLabels"
        [legend]="pieLegend"
        [tooltip]="pieTooltip">
      </apx-chart>
    </div>

    <!-- Legend Summary -->
    <div class="col-6">
      <!-- 2-Wheeler -->
      <div class="d-flex align-items-center gap-2 mb-3">
        <span class="rounded-circle flex-shrink-0" style="width:10px; height:10px; background:#2563eb;"></span>
        <div>
          <div class="text-muted" style="font-size:11px;">2-Wheeler</div>
          <div class="fw-bold" style="font-size:16px;">₹{{ currentData.twoWheelerRev | number }}</div>
          <div class="text-muted" style="font-size:10px;">{{ currentData.twoWheelerCount }} bookings</div>
        </div>
      </div>
      <!-- 4-Wheeler -->
      <div class="d-flex align-items-center gap-2">
        <span class="rounded-circle flex-shrink-0" style="width:10px; height:10px; background:#f59e0b;"></span>
        <div>
          <div class="text-muted" style="font-size:11px;">4-Wheeler</div>
          <div class="fw-bold" style="font-size:16px;">₹{{ currentData.fourWheelerRev | number }}</div>
          <div class="text-muted" style="font-size:10px;">{{ currentData.fourWheelerCount }} bookings</div>
        </div>
      </div>
    </div>

  </div>
</div>
