<div
  class="d-flex align-items-center justify-content-center min-vh-100 py-4 px-3"
>
  <div class="card border shadow-sm rounded-4 w-100" style="max-width: 450px">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <h2 class="fs-4 fw-bold text-dark mb-1">Vendor Login</h2>
        <p class="text-secondary small mb-0">Enter your details to continue</p>
      </div>

      <div
        *ngIf="errorMessage"
        class="alert alert-danger py-2 text-red small d-flex align-items-center mb-4"
        role="alert"
      >
        <i class="bi bi-exclamation-circle-fill text-red me-2"></i
        >{{ errorMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-1">
          <label class="form-label fw-semibold small mb-1">Email Address</label>
          <input
            type="email"
            formControlName="email"
            class="form-control"
            [class.is-invalid]="
              loginForm.get('email')?.invalid && loginForm.get('email')?.touched
            "
            placeholder="name@company.com"
            [attr.readonly]="isLoading ? true : null"
          />
          <div style="min-height: 1.45rem" class="mt-1">
            <small
              class="text-danger"
              *ngIf="
                loginForm.get('email')?.hasError('pattern') &&
                loginForm.get('email')?.touched
              "
            >
              Please enter a valid email.
            </small>
          </div>
        </div>

        <div class="mb-1">
          <label class="form-label fw-semibold small mb-1">Password</label>
          <div class="position-relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              class="form-control pe-5"
              [class.is-invalid]="
                loginForm.get('password')?.invalid &&
                loginForm.get('password')?.touched
              "
              placeholder="••••••••"
              [attr.readonly]="isLoading ? true : null"
            />
            <i
              class="bi position-absolute top-50 end-0 translate-middle-y me-3"
              [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
              (click)="showPassword = !showPassword"
              role="button"
              style="cursor: pointer; z-index: 5"
            ></i>
          </div>
          <div style="min-height: 1.45rem" class="mt-1">
            <small
              class="text-danger"
              *ngIf="
                loginForm.get('password')?.invalid &&
                loginForm.get('password')?.touched
              "
            >
              Password must be at least 8 characters.
            </small>
          </div>
        </div>

        <div class="text-end mb-3">
          <a
            routerLink="/vendor/reset-password"
            class="text-navy-black text-decoration-none small fw-semibold"
            >Forgot Password?</a
          >
        </div>

        <button
          type="submit"
          [disabled]="loginForm.invalid || isLoading"
          class="btn btn-yellow w-100 py-2 fw-bold rounded-3 shadow-sm"
        >
          <span
            *ngIf="isLoading"
            class="spinner-border spinner-border-sm me-2"
          ></span>
          {{ isLoading ? "Please wait..." : "Login" }}
        </button>

        <p class="text-center mt-4 small text-secondary mb-0">
          Doesn't have an account?
          <a
            routerLink="/vendor/registration"
            class="fw-semibold text-light-blue text-decoration-none"
            >Register here</a
          >
        </p>
      </form>
    </div>
  </div>
</div>
