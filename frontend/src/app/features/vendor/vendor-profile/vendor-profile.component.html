<div class="container py-4"  *ngIf="vendorData">

  <!-- Header -->
  <div class="text-center  rounded mb-3 p-3"
    style="background: #FFDF66">
    <div class="mx-auto mb-2 rounded-circle d-flex align-items-center justify-content-center overflow-hidden"
      style="width:88px; height:88px; border:2px solid rgb(87, 87, 87);">
      <img src="../../../../assets/profile-avator.webp" 
            alt="Vendor Avatar"
            style="width: 100%; height: 100%; object-fit: cover;">
    </div>
    <h5 class="fw-bold mb-1 text-black">{{ vendorData.name }}</h5>
    <span class="badge rounded-pill" style="background:rgba(34,197,94,0.2);color: #33AD5F;">
      <i class="bi bi-check-circle-fill me-1"></i>{{ vendorData.accountStatus }}
    </span>
  </div>

  <!-- Contact -->
  <div class="shadow-sm rounded-2 mb-3">
    <div class="p-3">
      <h6 class="fw-bold mb-3">Contact Information</h6>
      <div class="d-flex gap-3 mb-3">
        <div class="rounded-circle d-flex align-items-center justify-content-center"
          style="width:40px;height:40px;background:#EEF2FF;">
          <i class="bi bi-telephone-fill" style="color:#4BD2F8;"></i>
        </div>
        <div>
          <small class="text-muted d-block">Phone</small>
          <strong style="font-size:14px;">{{ vendorData.phone }}</strong>
        </div>
      </div>
      <div class="d-flex gap-3">
        <div class="rounded-circle d-flex align-items-center justify-content-center"
          style="width:40px;height:40px;background:#EEF2FF;">
          <i class="bi bi-envelope-fill" style="color:#4BD2F8;"></i>
        </div>
        <div>
          <small class="text-muted d-block">Email</small>
          <strong style="font-size:14px;">{{ vendorData.email }}</strong>
        </div>
      </div>
    </div>
  </div>

  <!-- Account Status -->
  <div class="shadow-sm rounded-2 mb-3">
    <div class="p-3">
      <h6 class="fw-bold mb-3">Account Status</h6>
      <div class="d-flex align-items-center gap-3 mb-3">
        <i class="bi bi-check-circle-fill" style="font-size:24px; color:#16A34A;"></i>
        <div>
          <strong class="d-block" style="font-size:14px;">Account Active</strong>
          <small class="text-muted">All services are operational</small>
        </div>
      </div>
      <div class="d-flex gap-2">
        <div class="flex-fill rounded-3 p-2" style="background:#dffae7;">
          <small class="d-block" style="font-size:11px; color:#16A34A;">Member Since</small>
          <strong style="font-size:13px; color:#33AD5F;">{{ getFormattedDate() }}</strong>
        </div>
      </div>
    </div>
  </div>

</div>
