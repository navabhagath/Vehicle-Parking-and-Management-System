<div class="transactions-wrapper my-5">
  <h5 class="fw-semibold mb-3">Recent Transactions</h5>
 
  <div
    *ngIf="!loading && transactions.length === 0"
    class="text-center text-muted py-5"
  >
    <p class="mb-0">No transactions yet.</p>
  </div>
 
  <div *ngIf="transactions.length > 0">
    <div
      class="transaction-card d-flex align-items-center justify-content-between p-3 mb-2 rounded-3"
      *ngFor="let txn of transactions"
    >
      <span
        class="badge rounded-pill fw-medium txn-badge"
        [ngClass]="{
          'badge-recharge': txn.type === 'RECHARGE' || txn.type === 'RECEIVE',
          'badge-deduct': txn.type === 'DEDUCT' || txn.type === 'WITHDRAWAL',
          'badge-withdrawal': txn.type === 'SENT',
        }"
      >
        {{ txn.type }}
      </span>
 
      <span
        class="fw-semibold txn-amount"
        [ngClass]="{
          'text-green': txn.type === 'RECHARGE' || txn.type === 'RECEIVE',
          'text-red': txn.type === 'DEDUCT' || txn.type === 'WITHDRAWAL',
          'text-yellow-dark': txn.type === 'SENT',
        }"
      >
        {{ txn.type === "RECHARGE" || txn.type === "RECEIVE" ? "+" : "-"
        }}{{ txn.amount | currency: "INR" : "symbol" : "1.2-2" }}
      </span>
 
      <small
        class="fw-medium txn-status"
        [ngClass]="{
          'text-green': txn.status === 'SUCCESS',
          'text-red': txn.status === 'FAILED',
        }"
      >
        {{ txn.status }}
      </small>
 
      <small class="text-muted txn-date">
        {{ txn.timestamp | date: "dd MMM yyyy, hh:mm a" }}
      </small>
    </div>
  </div>
 
  <div *ngIf="loading" class="text-center py-3">
    <div class="spinner-border spinner-border-sm text-muted" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
 
  <div
    *ngIf="!loading && transactions.length > 0"
    class="d-flex justify-content-between align-items-center mt-3"
  >
    <button
      class="btn btn-outline-dark rounded-pill px-4 py-2 fw-medium"
      [disabled]="!hasPrev"
      (click)="prevPage()"
    >
      &laquo; Back
    </button>
    <span class="text-muted fw-medium">Page {{ currentPage }}</span>
    <button
      class="btn btn-outline-dark rounded-pill px-4 py-2 fw-medium"
      [disabled]="!hasNext"
      (click)="nextPage()"
    >
      Next &raquo;
    </button>
  </div>
</div>
